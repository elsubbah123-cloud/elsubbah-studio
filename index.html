<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استوديو الصباح | EL-Subbah Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:   #C9A96E;
      --gold-lt:#E2C98A;
      --dark:   #0D0C0B;
      --mid:    #1A1814;
      --card:   #151310;
      --text:   #D4CECC;
      --muted:  #7A7370;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,169,110,.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,169,110,.05) 0%, transparent 50%);
      pointer-events: none;
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid rgba(201,169,110,.15);
      padding: 48px 36px 40px;
      text-align: center;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 2px solid rgba(201,169,110,.4);
      overflow: hidden;
      background: var(--mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .studio-name-ar {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-style: italic;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }
    .studio-name-en {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .studio-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.7;
    }
    .divider {
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 0 auto 32px;
      opacity: .5;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      background: var(--mid);
      border: 1px solid rgba(201,169,110,.15);
      color: var(--text);
      text-decoration: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      transition: border-color .3s, background .3s, color .3s, transform .2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(201,169,110,.07), transparent);
      opacity: 0;
      transition: opacity .3s;
    }
    .link-btn:hover {
      border-color: var(--gold);
      color: var(--gold-lt);
      transform: translateY(-2px);
    }
    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0); }
    .link-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .link-label { flex: 1; text-align: right; }
    .link-arrow { font-size: 12px; color: var(--muted); transition: color .3s; }
    .link-btn:hover .link-arrow { color: var(--gold); }
    .link-btn.featured {
      border-color: rgba(201,169,110,.35);
      background: rgba(201,169,110,.06);
    }
    .link-btn.featured:hover { background: rgba(201,169,110,.12); }
    .footer {
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(122,115,112,.4);
    }
    @media (max-width: 460px) {
      .card { padding: 40px 24px 32px; }
      .studio-name-ar { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="card">
  <div class="avatar">📸</div>
  <h1 class="studio-name-ar">الصباح</h1>
  <p class="studio-name-en">EL-SUBBAH STUDIO</p>
  <p class="studio-tagline">تصوير فوتوغرافي احترافي<br>أعراس · خطوبة · بورتريه</p>
  <div class="divider"></div>
  <div class="links">
    <a class="link-btn" href="https://wa.me/201009892555" target="_blank" rel="noopener">
      <span class="link-icon">💬</span>
      <span class="link-label">تواصل عبر واتساب</span>
      <span class="link-arrow">←</span>
    </a>
    <a class="link-btn" href="tel:+201009892555">
      <span class="link-icon">📞</span>
      <span class="link-label">اتصل بنا</span>
      <span class="link-arrow">←</span>
    </a>
    <a class="link-btn" href="https://www.facebook.com/Tamer.Elsubbah.Photographer" target="_blank" rel="noopener">
      <span class="link-icon">📘</span>
      <span class="link-label">صفحتنا على فيسبوك</span>
      <span class="link-arrow">←</span>
    </a>
    <a class="link-btn featured" href="#offers">
      <span class="link-icon">✨</span>
      <span class="link-label">أحدث العروض</span>
      <span class="link-arrow">←</span>
    </a>
  </div>
  <p class="footer">© 2026 EL-SUBBAH STUDIO</p>
</div>
</body>
</html>
