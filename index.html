<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استوديو الصباحitle>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0c;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 430px;
      aspect-ratio: 1152 / 2048;
      margin: 0 auto;
    }

    .page img.bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
    }

    .btn {
      position: absolute;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: transparent;
      border: none;
      padding: 0;
    }

    .btn-text {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      font-weight: 700;
      color: rgba(220, 200, 150, 0.9);
      letter-spacing: 1px;
      font-size: clamp(11px, 2.6vw, 15px);
      text-align: center;
      width: 100%;
    }

    /* مواضع الأزرار المعدلة */
    .btn-fb {
      top: 49.5%;
      height: 5.5%;
      right: 8%;
      width: 68%;
    }
    .btn-wa {
      top: 56%;
      height: 5.5%;
      right: 11%;
      width: 68%;
    }
    .btn-call {
      top: 62.5%;
      height: 5.5%;
      right: 14%;
      width: 68%;
    }
    .btn-branches {
      top: 69%;
      height: 5.5%;
      right: 17%;
      width: 68%;
    }
    .btn-offers {
      top: 75.5%;
      height: 5.5%;
      right: 20%;
      width: 68%;
    }
    .btn-map {
      top: 82%;
      height: 5.5%;
      right: 23%;
      width: 68%;
    }

    /* popup الفروع */
    .branches-popup {
      display: none;
      position: absolute;
      top: 75%;
      right: 15%;
      width: 70%;
      background: rgba(10,8,6,.96);
      border: 1px solid rgba(201,160,64,.4);
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
    }
    .branches-popup.open { display: block; animation: slideDown .25s ease; }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .branch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(201,160,64,.12);
      color: #d4cecc;
      font-family: 'Cairo', sans-serif;
      font-size: clamp(10px, 2.5vw, 14px);
      text-align: right;
    }
    .branch-item:last-child { border-bottom: none; }
    .branch-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c9a040;
      flex-shrink: 0;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="page">
  <img class="bg" src="bg.png" alt="استوديو الصباح" />

  <div class="overlay">

    <a class="btn btn-fb"
       href="https://www.facebook.com/Tamer.Elsubbah.Photographer"
       target="_blank" rel="noopener">
      <span class="btn-text">فيسبوك</span>
    </a>

    <a class="btn btn-wa"
       href="https://wa.me/201009892555"
       target="_blank" rel="noopener">
      <span class="btn-text">واتساب</span>
    </a>

    <a class="btn btn-call" href="tel:+201009892555">
      <span class="btn-text">اتصل بنا — 01009892555</span>
    </a>

    <button class="btn btn-branches" onclick="toggleBranches(event)">
      <span class="btn-text">فروعنا</span>
    </button>

    <div class="branches-popup" id="branchesPopup">
      <div class="branch-item"><span class="branch-dot"></span>شيبة — بجوار مركز الشباب</div>
      <div class="branch-item"><span class="branch-dot"></span>بهنباي — أمام صيدلية الحجر</div>
      <div class="branch-item"><span class="branch-dot"></span>النخاس — أمام مسجد الفتح</div>
      <div class="branch-item"><span class="branch-dot"></span>القنايات — بجوار مسجد النصر</div>
    </div>

    <a class="btn btn-offers" href="#offers">
      <span class="btn-text">أحدث العروض</span>
    </a>

    <a class="btn btn-map"
       href="https://maps.app.goo.gl/DGbyZXKT4fXRygFf6"
       target="_blank" rel="noopener">
      <span class="btn-text">موقعنا على الخريطة</span>
    </a>

  </div>
</div>

<script>
  function toggleBranches(e) {
    e.stopPropagation();
    document.getElementById('branchesPopup').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('branchesPopup').classList.remove('open');
  });
</script>

</body>
</html>
