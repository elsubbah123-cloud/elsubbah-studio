<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- تم تغيير العنوان للتأكد من تحديث الكاش -->
  <title>استوديو الصباح | الروابط (محدث)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #111;
      font-family: 'Cairo', sans-serif;
    }

    .main-container {
      display: flex;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      line-height: 0;
      background-color: #000;
    }

    .bg-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* التنسيق الموحد للكلمات داخل الحقول */
    .link-btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center; /* توسيط الكلمة أفقياً */
      color: #E2C98A;
      text-decoration: none;
      font-size: clamp(12px, 3.5vw, 15px); 
      white-space: nowrap; 
      font-weight: 600;
      height: 7%; /* مساحة ضغط ممتازة للزرار */
      transform: translateY(-50%); /* التوسيط الرأسي الدقيق */
      transition: color 0.3s, text-shadow 0.3s;
      z-index: 10;
    }

    .link-btn:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(226, 201, 138, 0.8);
    }

    /* 
      === الإحداثيات الدقيقة بالمليمتر للمستطيلات السوداء ===
    */
    .btn-fb    { top: 46.5%; left: 26%; width: 40%; }
    .btn-wa    { top: 53.8%; left: 31%; width: 40%; }
    .btn-phone { top: 61.1%; left: 36%; width: 40%; }
    .btn-home  { top: 68.4%; left: 41%; width: 40%; }
    .btn-cart  { top: 75.7%; left: 46%; width: 40%; }
    .btn-gps   { top: 83.0%; left: 51%; width: 40%; }


    /* تنسيق النوافذ المنبثقة (Modals) */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      line-height: normal;
    }
    .modal-content {
      background: linear-gradient(145deg, #1A1814, #0D0C0B);
      border: 1px solid #C9A96E;
      border-radius: 15px;
      width: 85%;
      max-width: 350px;
      padding: 30px 20px;
      color: #D4CECC;
      position: relative;
      box-shadow: 0 0 25px rgba(201,169,110,0.15);
      direction: rtl;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      left: 15px;
      color: #C9A96E;
      font-size: 28px;
      cursor: pointer;
      transition: color 0.3s;
    }
    .close-btn:hover { color: #fff; }
    .modal h2 {
      color: #C9A96E;
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      font-family: 'Cairo', sans-serif;
    }
    
    .branches-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .branches-list li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(201,169,110,0.15);
      font-size: 15px;
      line-height: 1.6;
    }
    .branches-list li:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .branches-list strong {
      color: #E2C98A;
      margin-left: 5px;
    }

    .offers-content {
      text-align: center;
      font-size: 16px;
      color: #D4CECC;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<div class="main-container">
  <div class="wrapper">
    <!-- الصورة كخلفية -->
    <img src="land page.jpg" alt="استوديو الصباح" class="bg-image">

    <!-- الروابط -->
    <a href="https://www.facebook.com/Tamer.Elsubbah.Photographer" target="_blank" class="link-btn btn-fb">صفحتنا على فيسبوك</a>
    <a href="https://wa.me/201009892555" target="_blank" class="link-btn btn-wa">تواصل عبر واتساب</a>
    <a href="tel:+201009892555" class="link-btn btn-phone">اتصل بنا</a>
    <a href="javascript:void(0)" onclick="openBranches()" class="link-btn btn-home">فروعنا</a>
    <a href="javascript:void(0)" onclick="openOffers()" class="link-btn btn-cart">أحدث العروض</a>
    <a href="https://maps.app.goo.gl/DGbyZXKT4fXRygFf6" target="_blank" class="link-btn btn-gps">عنوان المكان</a>
  </div>
</div>

<!-- نافذة الفروع -->
<div id="branchesModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeBranches()">×</span>
    <h2>فروعنا</h2>
    <ul class="branches-list">
      <li><strong>شيبة:</strong> بجوار مركز الشباب</li>
      <li><strong>بهنباي:</strong> أمام صيدلية الحجر</li>
      <li><strong>النخاس:</strong> أمام مسجد الفتح</li>
      <li><strong>القنايات:</strong> بجوار مسجد النصر</li>
    </ul>
  </div>
</div>

<!-- نافذة أحدث العروض -->
<div id="offersModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeOffers()">×</span>
    <h2>أحدث العروض</h2>
    <div class="offers-content">
      <p>لا توجد عروض حالياً، تابعنا لمعرفة كل جديد!</p>
    </div>
  </div>
</div>

<script>
  var branchesModal = document.getElementById("branchesModal");
  var offersModal = document.getElementById("offersModal");

  function openBranches() {
    branchesModal.style.display = "flex";
  }

  function closeBranches() {
    branchesModal.style.display = "none";
  }

  function openOffers() {
    offersModal.style.display = "flex";
  }

  function closeOffers() {
    offersModal.style.display = "none";
  }

  window.onclick = function(event) {
    if (event.target == branchesModal) {
      branchesModal.style.display = "none";
    }
    if (event.target == offersModal) {
      offersModal.style.display = "none";
    }
  }
</script>

</body>
</html>
