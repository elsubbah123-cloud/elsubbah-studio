<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استوديو الصباح | الروابط</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111; /* لون خلفية غامق ليتماشى مع حواف الصورة */
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .wrapper {
      position: relative;
      width: 100%;
      max-width: 450px; /* مقاس شاشة الموبايل */
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .bg-image {
      width: 100%;
      display: block;
    }

    /* إعدادات النصوص داخل الحقول */
    .link-btn {
      position: absolute;
      height: 6%; /* ارتفاع الحقل ليتناسب مع التصميم */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E2C98A; /* لون ذهبي متناسق مع التصميم */
      text-decoration: none;
      font-size: 4vw; /* حجم خط متجاوب */
      font-weight: 600;
      cursor: pointer;
      transition: color 0.3s, text-shadow 0.3s;
      /* background: rgba(255,0,0,0.3); /* يمكنك تفعيل هذا السطر مؤقتاً لضبط الأماكن بدقة */
    }
    
    @media (min-width: 450px) {
      .link-btn { font-size: 16px; }
    }

    .link-btn:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(226, 201, 138, 0.8);
    }

    /* ضبط أماكن الحقول بالنسبة المئوية لتطابق الصورة */
    /* النسبة الأولى (top) للارتفاع، والثانية (left) للمسافة من اليسار بعد الأيقونة، و(width) لتغطية المساحة السوداء */
    .btn-fb    { top: 50.8%; left: 24%; width: 33%; }
    .btn-wa    { top: 58.2%; left: 29%; width: 33%; }
    .btn-phone { top: 65.6%; left: 34%; width: 33%; }
    .btn-home  { top: 73.0%; left: 39%; width: 33%; }
    .btn-cart  { top: 80.4%; left: 44%; width: 33%; }
    .btn-gps   { top: 87.8%; left: 49%; width: 33%; }

    /* تنسيق نافذة الفروع (Modal) */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: linear-gradient(145deg, #1A1814, #0D0C0B);
      border: 1px solid #C9A96E;
      border-radius: 15px;
      width: 85%;
      max-width: 350px;
      padding: 30px 20px;
      color: #D4CECC;
      position: relative;
      box-shadow: 0 0 25px rgba(201,169,110,0.15);
      direction: rtl;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      left: 15px;
      color: #C9A96E;
      font-size: 28px;
      cursor: pointer;
      transition: color 0.3s;
    }
    .close-btn:hover { color: #fff; }
    .modal h2 {
      color: #C9A96E;
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      font-family: 'Cairo', sans-serif;
    }
    .branches-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .branches-list li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(201,169,110,0.15);
      font-size: 15px;
      line-height: 1.6;
    }
    .branches-list li:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .branches-list strong {
      color: #E2C98A;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <!-- تأكد إن اسم الصورة مطابق تماماً لاسم الملف اللي عندك -->
  <img src="land page.jpg" alt="استوديو الصباح" class="bg-image">

  <!-- Facebook -->
  <a href="https://www.facebook.com/Tamer.Elsubbah.Photographer" target="_blank" class="link-btn btn-fb">صفحتنا على فيسبوك</a>

  <!-- WhatsApp -->
  <a href="https://wa.me/201009892555" target="_blank" class="link-btn btn-wa">تواصل عبر واتساب</a>

  <!-- Phone -->
  <a href="tel:+201009892555" class="link-btn btn-phone">اتصل بنا</a>

  <!-- Home (Branches) -->
  <a href="javascript:void(0)" onclick="openModal()" class="link-btn btn-home">فروعنا</a>

  <!-- Cart (Offers) -->
  <a href="#offers" class="link-btn btn-cart">أحدث العروض</a>

  <!-- GPS (Location) -->
  <a href="https://maps.app.goo.gl/DGbyZXKT4fXRygFf6" target="_blank" class="link-btn btn-gps">عنوان المكان</a>
</div>

<!-- نافذة الفروع -->
<div id="branchesModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2>فروعنا</h2>
    <ul class="branches-list">
      <li><strong>شيبة:</strong> بجوار مركز الشباب</li>
      <li><strong>بهنباي:</strong> أمام صيدلية الحجر</li>
      <li><strong>النخاس:</strong> أمام مسجد الفتح</li>
      <li><strong>القنايات:</strong> بجوار مسجد النصر</li>
    </ul>
  </div>
</div>

<script>
  // أكواد تشغيل وإغلاق نافذة الفروع
  var modal = document.getElementById("branchesModal");

  function openModal() {
    modal.style.display = "flex";
  }

  function closeModal() {
    modal.style.display = "none";
  }

  // إغلاق النافذة لو العميل ضغط في أي مساحة فاضية براها
  window.onclick = function(event) {
    if (event.target == modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
